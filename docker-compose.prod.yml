x-laravel-env: &laravel-env
  APP_NAME: Delni
  APP_ENV: production
  APP_KEY: ${APP_KEY:?Set APP_KEY}
  APP_DEBUG: "false"
  APP_URL: ${APP_URL:?Set APP_URL}
  APP_LOCALE: ar
  APP_FALLBACK_LOCALE: ar
  LOG_CHANNEL: stderr
  LOG_LEVEL: warning

  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME}
  DB_PASSWORD: ${SERVICE_PASSWORD_64_MYSQL}

  # Sessions stay on the database so admin logins survive a Redis restart.
  SESSION_DRIVER: database
  SESSION_SECURE_COOKIE: "true"
  SESSION_HTTP_ONLY: "true"
  SESSION_SAME_SITE: lax
  # Cache + queue run on Redis (cache -> db 1, queue -> db 0; see config/database.php).
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  FILESYSTEM_DISK: public
  # "*" is acceptable only because port 8080 is `expose`d (internal), never `published`.
  # The sole ingress is Coolify's reverse proxy. If you ever publish the port directly,
  # restrict this to the proxy's network CIDR to prevent X-Forwarded-For spoofing.
  TRUSTED_PROXIES: "*"

  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS}
  SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-}

  MAIL_MAILER: resend
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:?Set MAIL_FROM_ADDRESS}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:?Set MAIL_FROM_NAME}
  RESEND_KEY: ${RESEND_KEY:?Set RESEND_KEY}

  SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:?Set SUPER_ADMIN_NAME}
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:?Set SUPER_ADMIN_EMAIL}
  SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?Set SUPER_ADMIN_PASSWORD}

services:
  # One-shot release container: runs schema migrations + idempotent seeding once,
  # before any app container starts. Prevents concurrent migrations during rolling deploys.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    # Coolify-specific: this is a one-shot release container that runs migrations/seeders
    # and exits 0 by design. Without this flag Coolify treats the exited container as an
    # unhealthy/stopped service and restart-loops it until it hits the restart limit
    # ("Stopped after reaching restart limit"). exclude_from_hc removes it from monitoring.
    exclude_from_hc: true
    environment:
      <<: *laravel-env
      CONTAINER_ROLE: deploy
    volumes:
      - delni_public_storage:/var/www/html/storage/app/public
      - delni_icons_storage:/var/www/html/storage/app/icons
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      <<: *laravel-env
      CONTAINER_ROLE: app
    volumes:
      - delni_public_storage:/var/www/html/storage/app/public
      - delni_icons_storage:/var/www/html/storage/app/icons
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # No explicit connection: queue:work defaults to config('queue.default') = QUEUE_CONNECTION.
    # This guarantees the worker drains the SAME backend the app/Filament enqueue on. Hardcoding
    # "redis" here risks a producer/consumer split-brain if QUEUE_CONNECTION ever changes.
    command: php artisan queue:work --queue=default --sleep=3 --timeout=60 --tries=3 --memory=256 --max-jobs=1000 --max-time=3600
    environment:
      <<: *laravel-env
      CONTAINER_ROLE: worker
    volumes:
      - delni_public_storage:/var/www/html/storage/app/public
      - delni_icons_storage:/var/www/html/storage/app/icons
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php /var/www/html/artisan queue:deployment-check >/dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: php artisan schedule:work --no-interaction
    environment:
      <<: *laravel-env
      CONTAINER_ROLE: scheduler
    volumes:
      - delni_public_storage:/var/www/html/storage/app/public
      - delni_icons_storage:/var/www/html/storage/app/icons
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php /var/www/html/artisan scheduler:health-check >/dev/null"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 120s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # appendonly persists queued jobs across restarts. noeviction protects those jobs:
    # cache (db 1) and queue (db 0) share the instance, so LRU eviction could drop jobs.
    # 256mb is ample for this app's cache+queue volume; raise if you scale up.
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - delni_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${SERVICE_PASSWORD_64_MYSQL_ROOT}
      MYSQL_DATABASE: ${DB_DATABASE:?Set DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME:?Set DB_USERNAME}
      MYSQL_PASSWORD: ${SERVICE_PASSWORD_64_MYSQL}
    volumes:
      - delni_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --protocol=tcp -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  delni_mysql_data:
  delni_public_storage:
  delni_icons_storage:
  delni_redis_data:
