; PHP-FPM pool configuration for production Docker deployments.
;
; Default Alpine image ships pm.max_children = 5, which causes 502s at ~20 concurrent
; requests. Formula: pm.max_children = container_ram / per_worker_rss.
; A Laravel worker on this app uses ~40-60 MB RSS at steady state (verify with:
;   ps --no-headers -o "rss,cmd" -C php-fpm | awk '{ sum+=$1 } END { printf "%dM\n", sum/NR/1024 }')
; Conservative default here assumes a 1-2 GB container (20 × 50 MB = 1 GB).
; Increase to 50 if deployed on a 4 GB instance.

[www]
user  = www-data
group = www-data

listen = 9000

pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
; Recycle workers to prevent gradual memory growth (memory leaks, Telescope, etc.)
pm.max_requests      = 500

; Pipe PHP worker stdout/stderr to the FPM master process (which supervisor captures).
; Without this, PHP errors inside workers are silently dropped.
; Proof: https://rtfm.co.ua/en/linux-php-fpm-docker-stdout-and-stderr-no-an-applications-error-logs/
catch_workers_output    = yes
; Prevent FPM from wrapping each log line in [pool www] boilerplate — keeps logs clean.
decorate_workers_output = no

; Log slow requests taking longer than 5 s — useful alongside k6 soak results
slowlog              = /proc/self/fd/2
request_slowlog_timeout = 5s
