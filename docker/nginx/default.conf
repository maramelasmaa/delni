server {
    listen 8080;
    server_name _;
    root /var/www/html/public;
    index index.php;
    charset utf-8;

    access_log /dev/stdout;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    client_max_body_size 16m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Livewire 4 serves its JS from a hash-based path derived from APP_KEY.
    # An explicit location is required; falling through to `location /` is unreliable.
    location ~ ^/livewire-[a-f0-9]+/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Vite build assets have content-hashed filenames — safe to cache aggressively.
    # add_header directives here do NOT inherit from the server block, so repeat security headers.
    location ~* ^/build/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        try_files $uri =404;
    }

    # Other static files (images, fonts, etc.) — serve from disk, no fallback needed.
    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
}
